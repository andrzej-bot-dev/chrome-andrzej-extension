<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Andrzej — OpenClaw</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <span id="conn-dot" class="dot offline" title="Disconnected"></span>
      <label class="auto-toggle" title="Allow automatic actions on this site (without asking)">
        <input type="checkbox" id="site-allow">
        <span>auto</span>
      </label>
    </div>
    <div class="top-actions">
      <select id="model-select" title="Select model / provider"></select>
      <button id="btn-new" class="icon-btn" title="New conversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button id="btn-history" class="icon-btn" title="Chat history">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
      <button id="btn-settings" class="icon-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <main id="chat"></main>

  <div id="history-pane" class="pane hidden">
    <div class="pane-head">
      <b>Chat history</b>
      <button id="btn-history-close" class="icon-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div id="history-list"></div>
  </div>

  <div id="offline-hint" class="hidden">
    <p><b>No connection to OpenClaw.</b></p>
    <p id="offline-reason" class="muted"></p>
    <p><button id="btn-reconnect">Reconnect</button>
       <button id="btn-open-options">Connection settings</button></p>
  </div>

  <footer id="composer">
    <div id="resize-handle"></div>
    <div id="context-row">
      <span id="working" class="hidden"><span class="spinner"></span><span id="working-label">Andrzej is working…</span>
        <button id="btn-stop" title="Stop">■ stop</button></span>
    </div>
    <div id="input-row">
      <textarea id="input" rows="3" placeholder="Write… (Enter — send, Shift+Enter — new line)"></textarea>
      <button id="btn-send" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </footer>

  <details id="debug-pane" class="hidden">
    <summary>debug (WebSocket frames)</summary>
    <pre id="debug-log"></pre>
  </details>

  <script type="module" src="panel.js"></script>
</body>
</html>
